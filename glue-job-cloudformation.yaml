AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for AWS Glue Job'

Parameters:
  GlueJobName:
    Type: String
    Default: sample-glue-job
    Description: Name of the Glue Job
  
  GlueScriptLocation:
    Type: String
    Default: s3://my-bucket/scripts/glue-job.py
    Description: S3 location of the Glue job script
  
  GlueRoleArn:
    Type: String
    Description: ARN of the IAM role for Glue Job

Resources:
  # Glue Job
  SampleGlueJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Ref GlueJobName
      Description: Sample Glue job for data processing
      Role: !Ref GlueRoleArn
      Command:
        Name: glueetl
        ScriptLocation: !Ref GlueScriptLocation
        PythonVersion: '3'
      DefaultArguments:
        '--TempDir': s3://my-bucket/temp/
        '--job-bookmark-option': job-bookmark-enable
        '--enable-spark-ui': 'true'
        '--spark-event-logs-path': s3://my-bucket/spark-logs/
      MaxRetries: 1
      Timeout: 2880
      GlueVersion: '4.0'
      WorkerType: G.2X
      NumberOfWorkers: 10
      Tags:
        Environment: Development
        Application: DataPipeline

  # Glue Trigger (Optional - runs job on a schedule)
  GlueJobTrigger:
    Type: AWS::Glue::Trigger
    Properties:
      Name: !Sub '${GlueJobName}-trigger'
      Type: SCHEDULED
      ScheduleExpression: 'cron(0 2 * * ? *)'
      StartOnCreation: true
      Actions:
        - JobName: !Ref SampleGlueJob
          Arguments:
            '--job-bookmark-option': job-bookmark-enable

Outputs:
  GlueJobName:
    Description: Name of the created Glue Job
    Value: !Ref SampleGlueJob
  
  GlueJobArn:
    Description: ARN of the created Glue Job
    Value: !GetAtt SampleGlueJob.Arn
  
  TriggerName:
    Description: Name of the Glue Trigger
    Value: !Ref GlueJobTrigger
